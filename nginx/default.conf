server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name localhost;

    ssl_certificate /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Increase max body size for uploads
    client_max_body_size 100M;

    # Use Docker's embedded DNS resolver so nginx re-resolves service names
    resolver 127.0.0.11 valid=30s;

    # backend/service variables (resolved via resolver when used as variables)
    set $java_backend "java-backend:8082";
    set $go_backend "go-backend:8081";
    set $vite_frontend "frontend:8080";

    # Route file uploads to Go file server
    location /api/files/ {
        proxy_pass http://$go_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Swagger UI for the Go file service
    location /swagger/ {
        proxy_pass http://$go_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    location /api/ {
        # Proxy to Java backend over HTTPS (Spring serves HTTPS in dev)
        # Use a variable so nginx will consult the resolver periodically
        proxy_pass https://$java_backend;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_verify off; # dev only
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    location /ws {
        # SockJS / WebSocket proxy to backend over HTTPS
        proxy_pass https://$java_backend;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_verify off; # dev only
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        # Frontend (Vite) is running with HTTPS inside the container — proxy over HTTPS
        proxy_pass https://$vite_frontend;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
