version: "3.9"
services:
  ffrontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"

  go-backend:
    build:
      context: ./server/go
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - ./uploads:/app/uploads
    environment:
      - UPLOADS_DIR=/app/uploads

  java-backend:
    build:
      context: ./server/java
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
